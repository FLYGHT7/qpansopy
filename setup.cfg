[flake8]
max-line-length = 119
exclude =
    .git,
    __pycache__,
    .venv

per-file-ignores =
    # QGIS calculation modules: star imports (from qgis.core import *) are the standard QGIS pattern.
    # Explicit imports alongside star imports generate F401 false positives.
    # Compact operator/bracket spacing is intentional for aviation formula readability.
    # W291/W293 in these files originate from UTF-8 BOM encoding that autopep8 cannot rewrite safely.
    # Unblocked by: TD-001 full module refactor to explicit imports
    Q_Pansopy/modules/conv/*.py: F401,F403,F405,E225,E231,E201,E202,E211,E221,E222,E265,E266,E402,E501,W291,W293
    Q_Pansopy/modules/pbn/*.py: F401,F403,F405,E225,E231,E201,E202,E211,E221,E222,E265,E266,E402,E501,W291,W293
    Q_Pansopy/modules/departures/*.py: F401,F403,F405,E225,E231,E201,E202,E211,E221,E222,E265,E266,E501,E127,E128,W291,W293
    Q_Pansopy/modules/utilities/*.py: F401,F403,F405,E225,E231,E201,E202,E211,E221,E222,E265,E266,E402,E501,E127,E128,W291,W293
    Q_Pansopy/modules/utilities/fix_tolerances/*.py: F401,F403,F405,E225,E231,E201,E202,E211,E221,E222,E265,E266,E402,E501,W291,W293
    Q_Pansopy/modules/basic_ils.py: F401,F403,F405,E225,E231,E201,E202,E211,E221,E222,E265,E266,E501,W291,W293
    Q_Pansopy/modules/oas_ils.py: F401,F403,F405,E225,E231,E201,E202,E211,E221,E222,E265,E266,E501,W291,W293
    Q_Pansopy/modules/vss_loc.py: F401,F403,F405,E225,E231,E201,E202,E211,E221,E222,E265,E266,E501,W291,W293
    Q_Pansopy/modules/vss_straight.py: F401,F403,F405,E225,E231,E201,E202,E211,E221,E222,E265,E266,E501,W291,W293
    Q_Pansopy/modules/wind_spiral.py: F401,F403,F405,E225,E231,E201,E202,E211,E221,E222,E265,E266,E501,E127,E128,W291,W293
    # ILS dockwidgets: 2-space indentation + long formula strings are legacy artifacts.
    # Unblocked by: TD-002 dockwidget rewrite
    Q_Pansopy/dockwidgets/ils/qpansopy_ils_dockwidget.py: E111,E114,E501
    Q_Pansopy/dockwidgets/ils/qpansopy_oas_ils_dockwidget.py: E111,E114,E501
    # utils.py: late import of simplejson/csv at module bottom avoids circular dependency at load time.
    Q_Pansopy/utils.py: E402
