<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Created following QPANSOPY icon style -->
<svg
   width="48"
   height="48"
   viewBox="0 0 48 48"
   version="1.1"
   id="svg1"
   inkscape:version="1.4 (86a8ad7, 2024-10-11)"
   sodipodi:docname="loc_dme_tolerance.svg"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.0"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview1"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     inkscape:document-units="px"
     showgrid="true"
     inkscape:current-layer="layer1">
  </sodipodi:namedview>
  <defs id="defs1" />
  <g
     inkscape:label="Layer 1"
     inkscape:groupmode="layer"
     id="layer1">
    <!-- Filled tolerance zone: narrow pie slice (2.4°) up to the DME arc -->
    <path
       id="tolerance-fill"
       style="fill:#4488ff;fill-opacity:0.35;stroke:none"
       d="M 24,4 L 20,24 A 22,22 0 0 1 28,24 Z" />
    <!-- LOC sector outline: narrow arms from station apex (2.4°) -->
    <path
       id="sector"
       style="opacity:1;fill:none;stroke:#000000;stroke-width:1.2;stroke-opacity:1"
       d="M 12,44 L 24,4 L 36,44" />
    <!-- DME distance arc at nominal fix range -->
    <path
       id="dme-arc"
       style="opacity:1;fill:none;stroke:#000000;stroke-width:1.5;stroke-opacity:1"
       d="M 20,24 A 22,22 0 0 1 28,24" />
    <!-- LOC station symbol at apex: dart/triangle -->
    <path
       id="loc-dart"
       style="fill:#000000;stroke:none"
       d="M 24,1.5 L 27,6.5 L 24,5.2 L 21,6.5 Z" />
    <!-- Tool label -->
    <text
       xml:space="preserve"
       style="font-weight:bold;font-stretch:condensed;font-size:14.5px;font-family:arial;-inkscape-font-specification:'arial Bold Condensed';text-align:center;text-anchor:middle;writing-mode:lr-tb;direction:ltr;opacity:1;fill:#000000;stroke:#000000;stroke-width:0.25;stroke-opacity:1"
       x="24"
       y="40"
       id="text1">DME</text>
  </g>
</svg>
